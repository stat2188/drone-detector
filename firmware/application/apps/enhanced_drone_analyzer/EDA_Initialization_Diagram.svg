<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <!-- Градиенты -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1F4E79"/>
      <stop offset="100%" style="stop-color:#2E75B6"/>
    </linearGradient>
    <linearGradient id="phaseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#388E3C"/>
    </linearGradient>
    <linearGradient id="criticalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F44336"/>
      <stop offset="100%" style="stop-color:#D32F2F"/>
    </linearGradient>
    <linearGradient id="systemGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3"/>
      <stop offset="100%" style="stop-color:#1976D2"/>
    </linearGradient>
    <linearGradient id="appGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9C27B0"/>
      <stop offset="100%" style="stop-color:#7B1FA2"/>
    </linearGradient>
    
    <!-- Стрелка -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrowheadRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D32F2F"/>
    </marker>
  </defs>
  
  <!-- Фон -->
  <rect width="1200" height="900" fill="#FAFAFA"/>
  
  <!-- Заголовок -->
  <rect x="0" y="0" width="1200" height="60" fill="url(#headerGrad)"/>
  <text x="600" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">
    EDA Initialization Order - Enhanced Drone Analyzer
  </text>
  
  <!-- Легенда -->
  <rect x="20" y="75" width="1160" height="50" fill="white" stroke="#E0E0E0" rx="5"/>
  <rect x="40" y="88" width="20" height="20" fill="url(#systemGrad)" rx="3"/>
  <text x="70" y="103" font-family="Arial, sans-serif" font-size="12" fill="#333">System Level</text>
  <rect x="200" y="88" width="20" height="20" fill="url(#criticalGrad)" rx="3"/>
  <text x="230" y="103" font-family="Arial, sans-serif" font-size="12" fill="#333">CRITICAL (Must be after chSysInit)</text>
  <rect x="500" y="88" width="20" height="20" fill="url(#appGrad)" rx="3"/>
  <text x="530" y="103" font-family="Arial, sans-serif" font-size="12" fill="#333">Application Level</text>
  <rect x="720" y="88" width="20" height="20" fill="url(#phaseGrad)" rx="3"/>
  <text x="750" y="103" font-family="Arial, sans-serif" font-size="12" fill="#333">Phase Machine</text>
  
  <!-- ==================== СЕКЦИЯ 1: СИСТЕМНАЯ ИНИЦИАЛИЗАЦИЯ ==================== -->
  <text x="600" y="165" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1F4E79" text-anchor="middle">
    SYSTEM INITIALIZATION (main.cpp)
  </text>
  
  <!-- Шаг 1: halInit -->
  <rect x="50" y="180" width="200" height="60" fill="url(#systemGrad)" rx="8"/>
  <text x="150" y="205" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">STEP 1</text>
  <text x="150" y="225" font-family="Consolas, monospace" font-size="13" fill="white" text-anchor="middle">halInit()</text>
  
  <!-- Стрелка 1→2 -->
  <line x1="250" y1="210" x2="300" y2="210" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Шаг 2: chSysInit - КРИТИЧЕСКИЙ -->
  <rect x="310" y="180" width="200" height="60" fill="url(#criticalGrad)" rx="8"/>
  <text x="410" y="200" font-family="Arial, sans-serif" font-size="11" fill="#FFCDD2" text-anchor="middle">CRITICAL</text>
  <text x="410" y="218" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">STEP 2</text>
  <text x="410" y="235" font-family="Consolas, monospace" font-size="13" fill="white" text-anchor="middle">chSysInit()</text>
  
  <!-- Стрелка 2→3 -->
  <line x1="510" y1="210" x2="560" y2="210" stroke="#D32F2F" stroke-width="3" marker-end="url(#arrowheadRed)"/>
  <text x="535" y="200" font-family="Arial, sans-serif" font-size="10" fill="#D32F2F" text-anchor="middle">MUST</text>
  
  <!-- Шаг 3: initialize_eda_mutexes - КРИТИЧЕСКИЙ -->
  <rect x="570" y="180" width="250" height="60" fill="url(#criticalGrad)" rx="8"/>
  <text x="695" y="200" font-family="Arial, sans-serif" font-size="11" fill="#FFCDD2" text-anchor="middle">CRITICAL - Fix E003</text>
  <text x="695" y="218" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">STEP 3</text>
  <text x="695" y="235" font-family="Consolas, monospace" font-size="11" fill="white" text-anchor="middle">initialize_eda_mutexes()</text>
  
  <!-- Стрелка 3→4 -->
  <line x1="820" y1="210" x2="870" y2="210" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Шаг 4: initialize_app -->
  <rect x="880" y="180" width="200" height="60" fill="url(#systemGrad)" rx="8"/>
  <text x="980" y="205" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">STEP 4</text>
  <text x="980" y="225" font-family="Consolas, monospace" font-size="13" fill="white" text-anchor="middle">initialize_app()</text>
  
  <!-- ==================== СЕКЦИЯ 2: КОНСТРУКТОР VIEW ==================== -->
  <line x1="600" y1="260" x2="600" y2="280" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <text x="600" y="310" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#7B1FA2" text-anchor="middle">
    APPLICATION INITIALIZATION (EnhancedDroneSpectrumAnalyzerView Constructor)
  </text>
  
  <!-- Компоненты конструктора -->
  <rect x="50" y="330" width="180" height="50" fill="url(#appGrad)" rx="5"/>
  <text x="140" y="350" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">DroneHardware</text>
  <text x="140" y="368" font-family="Arial, sans-serif" font-size="10" fill="#E1BEE7" text-anchor="middle">Controller</text>
  
  <rect x="250" y="330" width="180" height="50" fill="url(#appGrad)" rx="5"/>
  <text x="340" y="350" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">DroneScanner</text>
  <text x="340" y="368" font-family="Arial, sans-serif" font-size="10" fill="#E1BEE7" text-anchor="middle">state=IDLE</text>
  
  <rect x="450" y="330" width="180" height="50" fill="url(#appGrad)" rx="5"/>
  <text x="540" y="350" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">DroneDisplay</text>
  <text x="540" y="368" font-family="Arial, sans-serif" font-size="10" fill="#E1BEE7" text-anchor="middle">Controller</text>
  
  <rect x="650" y="330" width="180" height="50" fill="url(#appGrad)" rx="5"/>
  <text x="740" y="350" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">AudioManager</text>
  <text x="740" y="368" font-family="Arial, sans-serif" font-size="10" fill="#E1BEE7" text-anchor="middle">audio_controller</text>
  
  <rect x="850" y="330" width="200" height="50" fill="url(#criticalGrad)" rx="5"/>
  <text x="950" y="350" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">ScanningCoordinator</text>
  <text x="950" y="368" font-family="Arial, sans-serif" font-size="10" fill="#FFCDD2" text-anchor="middle">Singleton::initialize()</text>
  
  <!-- ==================== СЕКЦИЯ 3: ФАЗОВАЯ МАШИНА ==================== -->
  <line x1="600" y1="400" x2="600" y2="420" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <text x="600" y="450" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#388E3C" text-anchor="middle">
    PHASE MACHINE (step_deferred_initialization in frame sync)
  </text>
  
  <!-- Фаза 1 -->
  <rect x="30" y="470" width="170" height="70" fill="url(#phaseGrad)" rx="8"/>
  <text x="115" y="490" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">PHASE 1</text>
  <text x="115" y="510" font-family="Arial, sans-serif" font-size="10" fill="#C8E6C9" text-anchor="middle">BUFFER</text>
  <text x="115" y="525" font-family="Arial, sans-serif" font-size="10" fill="#C8E6C9" text-anchor="middle">ALLOCATION</text>
  
  <line x1="200" y1="505" x2="220" y2="505" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Фаза 2 -->
  <rect x="225" y="470" width="170" height="70" fill="url(#phaseGrad)" rx="8"/>
  <text x="310" y="490" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">PHASE 2</text>
  <text x="310" y="510" font-family="Arial, sans-serif" font-size="10" fill="#C8E6C9" text-anchor="middle">DATABASE</text>
  <text x="310" y="525" font-family="Arial, sans-serif" font-size="10" fill="#C8E6C9" text-anchor="middle">LOADING</text>
  
  <line x1="395" y1="505" x2="415" y2="505" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Фаза 3 -->
  <rect x="420" y="470" width="170" height="70" fill="url(#phaseGrad)" rx="8"/>
  <text x="505" y="490" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">PHASE 3</text>
  <text x="505" y="510" font-family="Arial, sans-serif" font-size="10" fill="#C8E6C9" text-anchor="middle">HARDWARE</text>
  <text x="505" y="525" font-family="Arial, sans-serif" font-size="10" fill="#C8E6C9" text-anchor="middle">INIT</text>
  
  <line x1="590" y1="505" x2="610" y2="505" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Фаза 4 -->
  <rect x="615" y="470" width="170" height="70" fill="url(#phaseGrad)" rx="8"/>
  <text x="700" y="490" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">PHASE 4</text>
  <text x="700" y="510" font-family="Arial, sans-serif" font-size="10" fill="#C8E6C9" text-anchor="middle">UI</text>
  <text x="700" y="525" font-family="Arial, sans-serif" font-size="10" fill="#C8E6C9" text-anchor="middle">SETUP</text>
  
  <line x1="785" y1="505" x2="805" y2="505" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Фаза 5 -->
  <rect x="810" y="470" width="170" height="70" fill="url(#phaseGrad)" rx="8"/>
  <text x="895" y="490" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">PHASE 5</text>
  <text x="895" y="510" font-family="Arial, sans-serif" font-size="10" fill="#C8E6C9" text-anchor="middle">SETTINGS</text>
  <text x="895" y="525" font-family="Arial, sans-serif" font-size="10" fill="#C8E6C9" text-anchor="middle">LOAD</text>
  
  <line x1="980" y1="505" x2="1000" y2="505" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Фаза 6 -->
  <rect x="1005" y="470" width="170" height="70" fill="#FF9800" rx="8"/>
  <text x="1090" y="490" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">PHASE 6</text>
  <text x="1090" y="510" font-family="Arial, sans-serif" font-size="10" fill="#FFE0B2" text-anchor="middle">FINALIZING</text>
  <text x="1090" y="525" font-family="Arial, sans-serif" font-size="10" fill="#FFE0B2" text-anchor="middle">handlers</text>
  
  <!-- ==================== ФИНАЛЬНОЕ СОСТОЯНИЕ ==================== -->
  <line x1="600" y1="560" x2="600" y2="580" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="400" y="590" width="400" height="50" fill="#4CAF50" rx="10"/>
  <text x="600" y="620" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">FULLY_INITIALIZED - System Ready</text>
  
  <!-- ==================== СЕКЦИЯ 4: КРИТИЧЕСКИЕ ПРОБЛЕМЫ ==================== -->
  <rect x="30" y="660" width="560" height="220" fill="white" stroke="#D32F2F" stroke-width="2" rx="8"/>
  <rect x="30" y="660" width="560" height="30" fill="#D32F2F" rx="8"/>
  <rect x="30" y="682" width="560" height="8" fill="#D32F2F"/>
  <text x="310" y="682" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">CRITICAL ISSUES</text>
  
  <text x="50" y="720" font-family="Arial, sans-serif" font-size="12" fill="#333">
    <tspan font-weight="bold" fill="#D32F2F">E003:</tspan> Mutex initialization before chSysInit()
  </text>
  <text x="50" y="740" font-family="Arial, sans-serif" font-size="11" fill="#666">  - Static mutex objects require chMtxInit() AFTER RTOS starts</text>
  <text x="50" y="760" font-family="Arial, sans-serif" font-size="11" fill="#666">  - Solution: initialize_eda_mutexes() must be called after chSysInit()</text>
  
  <text x="50" y="790" font-family="Arial, sans-serif" font-size="12" fill="#333">
    <tspan font-weight="bold" fill="#D32F2F">Race Condition:</tspan> State machine phase transitions
  </text>
  <text x="50" y="810" font-family="Arial, sans-serif" font-size="11" fill="#666">  - Phase N could start before Phase N-1 completes</text>
  <text x="50" y="830" font-family="Arial, sans-serif" font-size="11" fill="#666">  - Solution: PhaseCompletion struct tracks each phase completion</text>
  
  <text x="50" y="860" font-family="Arial, sans-serif" font-size="12" fill="#333">
    <tspan font-weight="bold" fill="#D32F2F">Singleton:</tspan> Access before initialization
  </text>
  <text x="50" y="870" font-family="Arial, sans-serif" font-size="11" fill="#666">  - Solution: Use instance_safe() and check for nullptr</text>
  
  <!-- ==================== СЕКЦИЯ 5: ЗАВИСИМОСТИ ==================== -->
  <rect x="610" y="660" width="560" height="220" fill="white" stroke="#1976D2" stroke-width="2" rx="8"/>
  <rect x="610" y="660" width="560" height="30" fill="#1976D2" rx="8"/>
  <rect x="610" y="682" width="560" height="8" fill="#1976D2"/>
  <text x="890" y="682" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">COMPONENT DEPENDENCIES</text>
  
  <text x="630" y="720" font-family="Arial, sans-serif" font-size="11" fill="#333">
    <tspan font-weight="bold">ScanningCoordinator</tspan> depends on:
  </text>
  <text x="650" y="740" font-family="Arial, sans-serif" font-size="10" fill="#666">NavigationView, Hardware, Scanner, Display, Audio</text>
  
  <text x="630" y="765" font-family="Arial, sans-serif" font-size="11" fill="#333">
    <tspan font-weight="bold">DroneScanner</tspan> depends on:
  </text>
  <text x="650" y="785" font-family="Arial, sans-serif" font-size="10" fill="#666">UnifiedDroneDatabase, DroneHardwareController</text>
  
  <text x="630" y="810" font-family="Arial, sans-serif" font-size="11" fill="#333">
    <tspan font-weight="bold">UnifiedDroneDatabase</tspan> depends on:
  </text>
  <text x="650" y="830" font-family="Arial, sans-serif" font-size="10" fill="#666">EDA Mutexes (chMtxInit called after chSysInit)</text>
  
  <text x="630" y="855" font-family="Arial, sans-serif" font-size="11" fill="#333">
    <tspan font-weight="bold">DroneDisplayController</tspan> depends on:
  </text>
  <text x="650" y="870" font-family="Arial, sans-serif" font-size="10" fill="#666">Display Buffers, Spectrum FIFO</text>
</svg>