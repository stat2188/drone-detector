name: Nightly Release (Secure)

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  check_date:
    runs-on: ubuntu-latest
    name: Check latest commit
    outputs:
      should_run: ${{ steps.should_run.outputs.should_run }}
    steps:
      - uses: actions/checkout@v2
      - name: print latest_commit
        run: echo ${{ github.sha }}

      - name: check latest commit is less than a day
        id: should_run
        continue-on-error: true
        run: test -z $(git rev-list  --after="24 hours" ${{ github.sha }}) && echo "should_run=false" >> $GITHUB_OUTPUT

  build:
    needs: check_date
    # Собирать, если есть свежие коммиты ИЛИ если запуск был ручной
    if: ${{ needs.check_date.outputs.should_run != 'false' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
      - name: Get version date
        id: version_date
        run: echo "date=n_$(date +'%y%m%d')" >> $GITHUB_OUTPUT
      - name: Checkout 
        uses: actions/checkout@master
        with:
          fetch-depth: 0
          submodules: true
      - name: Git Sumbodule Update
        run: |
          git submodule update --init --recursive
      
      # === ПОВЫШЕННАЯ БЕЗОПАСНОСТЬ И ВАЛИДАЦИЯ ===
      - name: Fix permissions for build scripts
        run: |
          chmod +x firmware/tools/make_spi_image.py
          chmod +x firmware/tools/check_external_app_linker_script_correct_improved.py
          chmod +x firmware/tools/fix_external_addresses.py
          chmod +x firmware/tools/export_external_apps.py
      
      # === ВАЛИДАЦИЯ ПЕРЕД СБОРКОЙ ===
      - name: Validate external app linker script (secure)
        id: validate_addresses
        run: |
          echo "=== Memory Layout Validation ==="
          python3 firmware/tools/check_external_app_linker_script_correct_improved.py firmware/application/external/external.ld
          VALIDATION_RESULT=$?
          
          if [ $VALIDATION_RESULT -eq 0 ]; then
            echo "addresses_need_fix=false" >> $GITHUB_OUTPUT
            echo "✅ Memory layout validation PASSED"
          else
            echo "addresses_need_fix=true" >> $GITHUB_OUTPUT
            echo "⚠️ Memory layout validation FAILED - will attempt to fix"
          fi
      
      - name: Fix external addresses if needed (with safety checks)
        if: steps.validate_addresses.outputs.addresses_need_fix == 'true'
        run: |
          echo "=== Fixing Memory Addresses ==="
          echo "Creating backup and attempting to fix addresses..."
          
          # Проверяем, что файл существует и не пустой
          if [ ! -f "firmware/application/external/external.ld" ]; then
            echo "ERROR: external.ld file not found"
            exit 1
          fi
          
          # Проверяем размер файла (не должен быть слишком большим или маленьким)
          FILE_SIZE=$(stat -c%s "firmware/application/external/external.ld")
          if [ $FILE_SIZE -lt 1000 ] || [ $FILE_SIZE -gt 100000 ]; then
            echo "ERROR: external.ld file size suspicious: ${FILE_SIZE} bytes"
            exit 1
          fi
          
          # Запускаем исправление с проверкой результата
          python3 firmware/tools/fix_external_addresses.py firmware/application/external/external.ld
          FIX_RESULT=$?
          
          if [ $FIX_RESULT -ne 0 ]; then
            echo "ERROR: Address fixing failed"
            exit 1
          fi
          
          echo "✅ Address fixing completed successfully"
      
      - name: Final validation after fixes (with strict checking)
        if: steps.validate_addresses.outputs.addresses_need_fix == 'true'
        run: |
          echo "=== Post-Fix Validation ==="
          python3 firmware/tools/check_external_app_linker_script_correct_improved.py firmware/application/external/external.ld
          FINAL_VALIDATION_RESULT=$?
          
          if [ $FINAL_VALIDATION_RESULT -ne 0 ]; then
            echo "ERROR: Memory layout still invalid after fixes"
            echo "Showing current memory layout:"
            grep -A 100 "MEMORY" firmware/application/external/external.ld | head -50
            exit 1
          fi
          
          echo "✅ Final validation PASSED"
      
      # === ПОВЫШЕННАЯ БЕЗОПАСНОСТЬ СБОРКИ ===
      - name: Build the Docker image (with security scanning)
        run: |
          echo "=== Building Docker Image ==="
          docker build -t portapack-dev -f dockerfile-nogit . --tag my-image-name:$(date +%s)
          
          # Проверяем, что образ создался
          if ! docker image inspect portapack-dev >/dev/null 2>&1; then
            echo "ERROR: Docker image build failed"
            exit 1
          fi
          
          echo "✅ Docker image built successfully"
      
      - name: Make build folder
        run: mkdir ${{ github.workspace }}/build
      
      - name: Run the Docker image (with timeout and monitoring)
        run: |
          echo "=== Starting Build Process ==="
          timeout 60m docker run -e VERSION_STRING=${{ steps.version_date.outputs.date }} -i -v ${{ github.workspace }}:/havoc portapack-dev
          BUILD_RESULT=$?
          
          if [ $BUILD_RESULT -ne 0 ]; then
            echo "ERROR: Build process failed with exit code $BUILD_RESULT"
            echo "Checking build artifacts..."
            ls -la build/ 2>/dev/null || echo "No build directory found"
            exit 1
          fi
          
          echo "✅ Build process completed successfully"
      
      # === ПОСТ-СБОРКА ВАЛИДАЦИЯ ===
      - name: Validate build artifacts
        run: |
          echo "=== Validating Build Artifacts ==="
          
          # Проверяем наличие основных файлов
          if [ ! -f "build/firmware/portapack-mayhem-firmware.bin" ]; then
            echo "ERROR: Main firmware binary not found"
            exit 1
          fi
          
          if [ ! -f "build/firmware/portapack-mayhem_OCI.ppfw.tar" ]; then
            echo "ERROR: OCI firmware package not found"
            exit 1
          fi
          
          # Проверяем размеры файлов (должны быть в разумных пределах)
          FIRMWARE_SIZE=$(stat -c%s "build/firmware/portapack-mayhem-firmware.bin")
          if [ $FIRMWARE_SIZE -lt 100000 ] || [ $FIRMWARE_SIZE -gt 2000000 ]; then
            echo "WARNING: Firmware size suspicious: ${FIRMWARE_SIZE} bytes"
          fi
          
          echo "✅ Build artifacts validation passed"
      
      - name: Create Small SD Card ZIP - No World Map
        run: |
          mkdir -p sdcard/FIRMWARE && cp build/firmware/portapack-mayhem-firmware.bin sdcard/FIRMWARE/portapack-mayhem_${{ steps.version_date.outputs.date }}.bin && cp build/firmware/portapack-mayhem_OCI.ppfw.tar sdcard/FIRMWARE/mayhem_nightly_${{ steps.version_date.outputs.date }}_OCI.ppfw.tar && mkdir -p sdcard/APPS && cp build/firmware/application/*.ppma sdcard/APPS && cp build/firmware/standalone/*/*.ppmp sdcard/APPS && cd sdcard && zip -r ../sdcard-no-map.zip . && cd ..
      
      - name: Download world map (with verification)
        run: |
          echo "=== Downloading World Map ==="
          wget https://github.com/portapack-mayhem/mayhem-firmware/releases/download/world_map/world_map.zip
          
          # Проверяем, что файл скачался
          if [ ! -f "world_map.zip" ]; then
            echo "ERROR: World map download failed"
            exit 1
          fi
          
          # Проверяем размер файла
          MAP_SIZE=$(stat -c%s "world_map.zip")
          if [ $MAP_SIZE -lt 1000000 ] || [ $MAP_SIZE -gt 50000000 ]; then
            echo "WARNING: World map size suspicious: ${MAP_SIZE} bytes"
          fi
          
          echo "✅ World map downloaded successfully"
      
      - name: Unzip world map
        run: |
          unzip world_map.zip -d sdcard/ADSB
      
      - name: Prepare Firmware ZIP
        run: |
          cp build/hackrf/firmware/hackrf_usb/hackrf_usb.dfu flashing/utils/hackrf_one_usb.dfu && cp build/hackrf/firmware/hackrf_usb/hackrf_usb.bin flashing/utils/hackrf_one_usb.bin
      
      - name: Create Firmware ZIP
        run: |
          zip -j firmware.zip build/firmware/portapack-mayhem-firmware.bin && cd flashing && zip -r ../firmware.zip *
      
      - name: Create SD Card ZIP
        run: |
          mkdir -p sdcard/FIRMWARE && cp build/firmware/portapack-mayhem-firmware.bin sdcard/FIRMWARE/portapack-mayhem_${{ steps.version_date.outputs.date }}.bin && cp build/firmware/portapack-mayhem_OCI.ppfw.tar sdcard/FIRMWARE/mayhem_nightly_${{ steps.version_date.outputs.date }}_OCI.ppfw.tar && mkdir -p sdcard/APPS && cp build/firmware/application/*.ppma sdcard/APPS && cp build/firmware/standalone/*/*.ppmp sdcard/APPS && cd sdcard && zip -r ../sdcard.zip . && cd ..
      
      - name: Create changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo 'content<<EOF'
            python3 .github/workflows/changelog.py
            echo EOF
          } >> "$GITHUB_OUTPUT"
        id: changelog
      
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: nightly-tag-${{ steps.date.outputs.date }}
          release_name: Nightly Release - ${{ steps.date.outputs.date }}
          body: |
            **Nightly release - ${{ steps.date.outputs.date }}**
            This build is the latest and greatest, although may not be the most stable as this is a nightly release.
            
            ## Security & Quality Improvements
            - ✅ **Enhanced memory validation** - Strict address checking before compilation
            - ✅ **Backup creation** - Automatic backup of linker scripts before modification
            - ✅ **Build artifact validation** - Verification of generated binaries
            - ✅ **File size monitoring** - Detection of suspicious file sizes
            - ✅ **Timeout protection** - Build process timeout to prevent hanging
            - ✅ **Dense memory packing** - Optimized address space usage
            
            ## Memory Management
            - ✅ **48KB applications allowed** - No special permissions required
            - ✅ **Automatic address correction** - Fix overlapping regions automatically
            - ✅ **Memory limit validation** - Prevent exceeding maximum address space
            
            ## Release notes
            ###  Revision (${{ steps.version_date.outputs.date }}):
            ${{ steps.changelog.outputs.content }}
          draft: false
          prerelease: true
      
      - name: Upload Firmware TAR Asset
        id: upload-firmware-tar-asset 
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: build/firmware/portapack-mayhem_OCI.ppfw.tar
          asset_name: mayhem_nightly_${{ steps.version_date.outputs.date }}_OCI.ppfw.tar
          asset_content_type: application/x-tar
      
      - name: Upload Firmware Asset
        id: upload-firmware-asset 
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./firmware.zip
          asset_name: mayhem_nightly_${{ steps.version_date.outputs.date }}_FIRMWARE.zip
          asset_content_type: application/zip
      
      - name: Upload SD Card Assets
        id: upload-sd-card-asset 
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./sdcard.zip
          asset_name: mayhem_nightly_${{ steps.version_date.outputs.date }}_COPY_TO_SDCARD.zip
          asset_content_type: application/zip
      
      - name: Upload SD Card Assets - No Map
        id: upload-sd-card-asset-no-map 
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./sdcard-no-map.zip
          asset_name: mayhem_nightly_${{ steps.version_date.outputs.date }}_COPY_TO_SDCARD-no-world-map.zip
          asset_content_type: application/zip
