name: Enhanced Drone Analyzer - Code Quality & Mutex Check

on:
  push:
    branches: [ "main", "next", "master" ]
    paths:
      - 'firmware/application/apps/enhanced_drone_analyzer/**'
  pull_request:
    paths:
      - 'firmware/application/apps/enhanced_drone_analyzer/**'
  workflow_dispatch:

jobs:
  static_analysis:
    name: Static Analysis (Cppcheck + Clang-Tidy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck clang-tidy jq

      # ==============================================
      # STEP 1: Cppcheck Analysis
      # ==============================================
      - name: Run Cppcheck Analysis
        id: cppcheck
        run: |
          echo "=== Running Cppcheck ==="

          # Run cppcheck and save XML output
          cppcheck \
            --enable=all \
            --language=c++ \
            --std=c++17 \
            --xml-version=2 \
            --inline-suppr \
            --suppress=missingIncludeSystem \
            --suppress=unmatchedSuppression \
            --force \
            -j $(nproc) \
            firmware/application/apps/enhanced_drone_analyzer/ 2>&1 \
            | tee cppcheck_output.txt || true

          # Parse XML output to count REAL errors (severity="error" or "warning")
          # Note: severity="information" includes missingIncludeSystem which are false positives
          if [ -f cppcheck_output.txt ]; then
            # Count actual errors (error or warning severity) - NOT information
            ERROR_COUNT=$(grep -o 'severity="error"' cppcheck_output.txt | wc -l || echo "0")
            WARNING_COUNT=$(grep -o 'severity="warning"' cppcheck_output.txt | wc -l || echo "0")
            INFO_COUNT=$(grep -o 'severity="information"' cppcheck_output.txt | wc -l || echo "0")

            echo "Cppcheck Errors (severity=error): $ERROR_COUNT"
            echo "Cppcheck Warnings (severity=warning): $WARNING_COUNT"
            echo "Cppcheck Info (severity=information): $INFO_COUNT"

            # Report to GitHub
            if [ "$ERROR_COUNT" -gt "0" ]; then
              echo "::warning title=Cppcheck Errors::Found $ERROR_COUNT real errors in Enhanced Drone Analyzer"
              echo "has_real_errors=true" >> $GITHUB_ENV
            else
              echo "has_real_errors=false" >> $GITHUB_ENV
            fi

            if [ "$WARNING_COUNT" -gt "0" ]; then
              echo "::warning title=Cppcheck Warnings::Found $WARNING_COUNT warnings"
            fi

            echo "error_count=$ERROR_COUNT" >> $GITHUB_ENV
            echo "warning_count=$WARNING_COUNT" >> $GITHUB_ENV
            echo "info_count=$INFO_COUNT" >> $GITHUB_ENV
          else
            echo "has_real_errors=false" >> $GITHUB_ENV
            echo "error_count=0" >> $GITHUB_ENV
            echo "warning_count=0" >> $GITHUB_ENV
            echo "info_count=0" >> $GITHUB_ENV
          fi

      # ==============================================
      # STEP 2: Clang-Tidy Thread Safety Analysis
      # ==============================================
      - name: Run Clang-Tidy Thread Safety Analysis
        id: clang-tidy
        run: |
          echo "=== Running Clang-Tidy (Thread Safety) ==="

          # Focus on thread safety and concurrency issues
          # Add ALL include paths from CMakeLists.txt to avoid 'board.h not found' error
          clang-tidy \
            firmware/application/apps/enhanced_drone_analyzer/*.cpp \
            -checks=-*,thread-*,bugprone-*,deadcode-*,-bugprone-narrowing-conversions,-bugprone-signed-char-bitfield,-bugprone-implicit-widening-of-multiplication-result,-clang-diagnostic-error,-clang-diagnostic-warning \
            -header-filter='.*enhanced_drone_analyzer.*' \
            -- \
            -std=c++17 \
            -I. \
            -Ifirmware/ \
            -Ifirmware/application \
            -Ifirmware/application/ui \
            -Ifirmware/common \
            -Ifirmware/chibios/os/kernel/include \
            -Ifirmware/chibios/os/hal/include \
            -Ifirmware/chibios/os/ports/common/ARMCMx \
            -Ifirmware/chibios/os/ports/common/ARMCMx/CMSIS/include \
            -Ifirmware/chibios/os/ports/GCC/ARMCMx \
            -Ifirmware/chibios/test \
            -Ifirmware/chibios-portapack/os/ports/GCC/ARMCMx/LPC43xx_M0 \
            -Ifirmware/chibios-portapack/os/hal/platforms/LPC43xx_M0 \
            -Ifirmware/chibios-portapack/os/hal/platforms/LPC43xx \
            -Ifirmware/chibios-portapack/ext/fatfs/src \
            -Ifirmware/chibios-portapack/boards/PORTAPACK_APPLICATION \
            -Ifirmware/application/hw \
            -Ifirmware/apps \
            -Ifirmware/application/protocols \
            -Ifirmware/bmps \
            -Ifirmware/chibios/os/various \
            -Ifirmware/hackrf/firmware/libopencm3/include \
            -Ifirmware/hackrf/firmware/common \
            -Ifirmware/hackrf/firmware \
            -DFIRMWARE_APPLICATION \
            2>&1 | tee clang_tidy_output.txt || true

          # Check for actual warnings
          if grep -q 'warning:' clang_tidy_output.txt 2>/dev/null; then
            TIDY_COUNT=$(grep -c 'warning:' clang_tidy_output.txt || echo "0")
            echo "tidy_warnings=$TIDY_COUNT" >> $GITHUB_ENV
            echo "::warning title=Clang-Tidy Warnings::Found $TIDY_COUNT warnings"
          else
            echo "tidy_warnings=0" >> $GITHUB_ENV
          fi

      # ==============================================
      # STEP 3: Mutex-Specific Checks
      # ==============================================
      - name: Check Mutex Patterns
        run: |
          echo "=== Verifying Mutex Patterns ==="

          ERRORS=0
          WARNINGS=0

          # Check 1: Verify no chMtxDeinit usage (not available in this ChibiOS version)
          if grep -r "chMtxDeinit" firmware/application/apps/enhanced_drone_analyzer/ 2>/dev/null; then
            echo "::error title=Invalid ChibiOS API::Found chMtxDeinit - this function doesn't exist!"
            ERRORS=$((ERRORS + 1))
          else
            echo "✅ No chMtxDeinit usage (correct)"
          fi

          # Check 2: Verify RAII wrapper usage
          if grep -r "MutexLock" firmware/application/apps/enhanced_drone_analyzer/*.cpp 2>/dev/null | grep -v "class MutexLock" | grep -v "~MutexLock" > /dev/null; then
            echo "✅ MutexLock RAII wrapper is being used"
          else
            echo "::warning title=Missing RAII Wrapper::MutexLock not found - consider using RAII pattern"
            WARNINGS=$((WARNINGS + 1))
          fi

          # Check 3: Verify try_get methods for non-blocking access
          if grep -r "try_get" firmware/application/apps/enhanced_drone_analyzer/ 2>/dev/null; then
            echo "✅ Non-blocking try_get methods found"
          else
            echo "::warning title=Missing Non-blocking API::No try_get methods found for UI updates"
            WARNINGS=$((WARNINGS + 1))
          fi

          # Check 4: Verify internal methods are documented
          if grep -r "_internal" firmware/application/apps/enhanced_drone_analyzer/*.hpp 2>/dev/null | grep -q "@pre\|@note\|@invariant"; then
            echo "✅ Internal methods have mutex documentation"
          else
            echo "::warning title=Missing Documentation::_internal methods missing @pre/@note annotations"
            WARNINGS=$((WARNINGS + 1))
          fi

          echo "mutex_errors=$ERRORS" >> $GITHUB_ENV
          echo "mutex_warnings=$WARNINGS" >> $GITHUB_ENV

      # ==============================================
      # STEP 4: Upload Results as Artifact
      # ==============================================
      - name: Upload Analysis Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enhanced_drone_analyzer-analysis
          path: |
            cppcheck_output.txt
            clang_tidy_output.txt
          retention-days: 7

      # ==============================================
      # STEP 5: Summary and Exit Decision
      # ==============================================
      - name: Generate Summary
        run: |
          echo "## Enhanced Drone Analyzer - Static Analysis Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Cppcheck Results" >> $GITHUB_STEP_SUMMARY
          echo "- Real Errors (severity=error): ${{ env.error_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- Warnings (severity=warning): ${{ env.warning_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- Info Messages (severity=information): ${{ env.info_count }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Note:** Info messages are typically false positives from missing system headers (ch.h, etc.)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Clang-Tidy Thread Safety" >> $GITHUB_STEP_SUMMARY
          echo "- Warnings: ${{ env.tidy_warnings }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Mutex Pattern Verification" >> $GITHUB_STEP_SUMMARY
          echo "- Errors: ${{ env.mutex_errors }}" >> $GITHUB_STEP_SUMMARY
          echo "- Warnings: ${{ env.mutex_warnings }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Determine overall result
          # Only fail on real errors (severity=error), NOT information messages
          REAL_ERRORS=${{ env.error_count }}
          MUTEX_ERRORS=${{ env.mutex_errors }}

          if [ "$REAL_ERRORS" -gt "0" ] || [ "$MUTEX_ERRORS" -gt "0" ]; then
            echo "❌ **CI FAILED**: Critical issues found" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Real errors: $REAL_ERRORS, Mutex errors: $MUTEX_ERRORS" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Please review the analysis results above and fix the errors." >> $GITHUB_STEP_SUMMARY
            exit 1
          elif [ "${{ env.warning_count }}" -gt "0" ] || [ "${{ env.tidy_warnings }}" -gt "0" ] || [ "${{ env.mutex_warnings }}" -gt "0" ]; then
            echo "✅ **CI PASSED with warnings**: Code has some issues but no critical errors" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Consider reviewing the warnings for potential improvements." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **CI PASSED**: No issues found" >> $GITHUB_STEP_SUMMARY
          fi

  # ==============================================
  # JOB: Code Formatting Check (Clang-Format)
  # ==============================================
  clang_format_check:
    name: Code Formatting (Clang-Format)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Run Clang-Format Check
        run: |
          echo "=== Running Clang-Format Check ==="

          FORMAT_ISSUES=0

          # Check each .cpp file
          for file in firmware/application/apps/enhanced_drone_analyzer/*.cpp; do
            if [ -f "$file" ]; then
              # Create temporary file with formatted content
              TEMP_FILE=$(mktemp)
              clang-format "$file" > "$TEMP_FILE"

              # Compare with original
              if ! diff -q "$file" "$TEMP_FILE" >/dev/null 2>&1; then
                echo "::warning title=Formatting Issue::$file is not properly formatted"
                FORMAT_ISSUES=$((FORMAT_ISSUES + 1))
              fi
              rm -f "$TEMP_FILE"
            fi
          done

          # Check each .hpp file
          for file in firmware/application/apps/enhanced_drone_analyzer/*.hpp; do
            if [ -f "$file" ]; then
              TEMP_FILE=$(mktemp)
              clang-format "$file" > "$TEMP_FILE"

              if ! diff -q "$file" "$TEMP_FILE" >/dev/null 2>&1; then
                echo "::warning title=Formatting Issue::$file is not properly formatted"
                FORMAT_ISSUES=$((FORMAT_ISSUES + 1))
              fi
              rm -f "$TEMP_FILE"
            fi
          done

          if [ "$FORMAT_ISSUES" -gt 0 ]; then
            echo "::error title=Formatting Failed::Found $FORMAT_ISSUES files with formatting issues"
            echo "Run 'clang-format -i <file>' to fix formatting issues"
            exit 1
          else
            echo "✅ All files are properly formatted"
          fi

  # ==============================================
  # JOB: Dependency Check
  # ==============================================
  dependency_check:
    name: Dependencies & Includes
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Header Dependencies
        run: |
          echo "=== Checking Header Dependencies ==="

          # Verify required includes exist
          INCLUDES_OK=true

          # Check for #include <array> - needed for our refactoring
          if grep -q "#include <array>" firmware/application/apps/enhanced_drone_analyzer/*.cpp 2>/dev/null; then
            echo "✅ <array> include found"
          else
            echo "::warning title=Missing Include::<array> include not found"
            INCLUDES_OK=false
          fi

          # Check for ch.h include (for ChibiOS APIs)
          if grep -q "#include <ch.h>" firmware/application/apps/enhanced_drone_analyzer/*.cpp 2>/dev/null; then
            echo "✅ ChibiOS header included"
          else
            echo "::warning title=Missing ChibiOS::<ch.h> include not found directly"
          fi

          # Check for RAII wrapper class definition
          if grep -q "class MutexLock" firmware/application/apps/enhanced_drone_analyzer/ui_enhanced_drone_analyzer.hpp 2>/dev/null; then
            echo "✅ MutexLock RAII class defined"
          else
            echo "::error title=Missing RAII Wrapper::MutexLock class not found!"
            exit 1
          fi

          echo "✅ Dependency check completed"

  # ==============================================
  # JOB: Stack Usage Analysis
  # ==============================================
  stack_usage_check:
    name: Stack Usage Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Analyze Stack Usage
        run: |
          echo "=== Analyzing Stack Usage ==="

          LARGE_STACK=0
          MAX_STACK_SIZE=512

          # Check for large stack arrays (> 512 bytes)
          grep -rn 'std::array.*\[' firmware/application/apps/enhanced_drone_analyzer/*.hpp 2>/dev/null | \
            grep -oP '\[\d+\]' | \
            while read size; do
              NUM=$(echo "$size" | tr -d '[]')
              if [ "$NUM" -gt "$MAX_STACK_SIZE" ]; then
                echo "::warning title=Large Stack Array::Found std::array of size $NUM bytes"
                LARGE_STACK=$((LARGE_STACK + 1))
              fi
            done || true

          # Check for char buffers on stack
          grep -rn 'char.*\[.*\]' firmware/application/apps/enhanced_drone_analyzer/*.hpp 2>/dev/null | \
            while read line; do
              FILE=$(echo "$line" | cut -d: -f1)
              LINE_NUM=$(echo "$line" | cut -d: -f2)
              CONTENT=$(echo "$line" | cut -d: -f3-)

              if echo "$CONTENT" | grep -qP 'char\s+\w+\s*\[\s*\d+\s*\]'; then
                SIZE=$(echo "$CONTENT" | grep -oP '\[\s*\d+\s*\]' | tr -d '[]' | head -1)
                if [ -n "$SIZE" ] && [ "$SIZE" -gt 128 ]; then
                  echo "::warning title=Large Char Buffer::$FILE:$LINE_NUM Found char[$SIZE] buffer"
                fi
              fi
            done || true

          # Check for waterfall buffer specifically
          if grep -q 'waterfall_buffer_\[.*\]\[.*\]' firmware/application/apps/enhanced_drone_analyzer/*.hpp 2>/dev/null; then
            echo "::warning title=Large Waterfall Buffer::Found multi-dimensional array - consider moving to heap or static storage"
          fi

          echo "✅ Stack usage analysis completed"

  # ==============================================
  # JOB: Heap Usage Analysis
  # ==============================================
  heap_usage_check:
    name: Heap Usage Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Heap Usage
        run: |
          echo "=== Checking Heap-Allocating Types ==="

          HEAP_WARNINGS=0

          # Check for std::vector usage
          if grep -r 'std::vector' firmware/application/apps/enhanced_drone_analyzer/*.hpp 2>/dev/null; then
            echo "::warning title=Heap Allocation::Found std::vector usage - consider std::array for fixed-size containers"
            HEAP_WARNINGS=$((HEAP_WARNINGS + 1))
          fi

          # Check for std::map usage
          if grep -r 'std::map' firmware/application/apps/enhanced_drone_analyzer/*.hpp 2>/dev/null; then
            echo "::warning title=Heap Allocation::Found std::map usage - consider std::array or constexpr maps"
            HEAP_WARNINGS=$((HEAP_WARNINGS + 1))
          fi

          # Check for std::string usage (can allocate)
          if grep -r 'std::string' firmware/application/apps/enhanced_drone_analyzer/*.hpp 2>/dev/null | \
             grep -v 'const std::string\|&' > /dev/null; then
            echo "::warning title=Heap Allocation::Found std::string members - consider char arrays or string_view"
            HEAP_WARNINGS=$((HEAP_WARNINGS + 1))
          fi

          # Check for std::unique_ptr / std::shared_ptr
          if grep -r 'std::unique_ptr\|std::shared_ptr' firmware/application/apps/enhanced_drone_analyzer/*.hpp 2>/dev/null; then
            echo "::warning title=Heap Allocation::Found smart pointers - consider stack allocation"
            HEAP_WARNINGS=$((HEAP_WARNINGS + 1))
          fi

          # Check for dynamic allocation (new/delete)
          if grep -rn '\bnew \|\bdelete ' firmware/application/apps/enhanced_drone_analyzer/*.hpp 2>/dev/null | \
             grep -v '//.*new\|//.*delete' > /dev/null; then
            echo "::error title=Dynamic Allocation::Found manual new/delete - prefer RAII and smart pointers"
          fi

          if [ "$HEAP_WARNINGS" -gt 0 ]; then
            echo "::warning title=Heap Usage Summary::Found $HEAP_WARNINGS heap-allocating patterns"
          else
            echo "✅ No heap-allocating patterns found"
          fi

  # ==============================================
  # JOB: Magic Numbers Check
  # ==============================================
  magic_numbers_check:
    name: Magic Numbers Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Magic Numbers
        run: |
          echo "=== Checking for Magic Numbers ==="

          MAGIC_ERRORS=0

          # Check for hardcoded frequency values (large numbers > 1000000)
          grep -rnE '(\b[1-9][0-9]{6,}(?![;]))' \
            firmware/application/apps/enhanced_drone_analyzer/*.cpp \
            firmware/application/apps/enhanced_drone_analyzer/*.hpp 2>/dev/null | \
            grep -v '//' | \
            grep -v 'constexpr' | \
            grep -v 'namespace' | \
            while read line; do
              FILE=$(echo "$line" | cut -d: -f1)
              LINE_NUM=$(echo "$line" | cut -d: -f2)
              CONTENT=$(echo "$line" | cut -d: -f3-)

              # Check if it looks like a frequency (Hz)
              if echo "$CONTENT" | grep -qE '[0-9]{6,}ULL?'; then
                echo "::warning title=Magic Frequency Number::$FILE:$LINE_NUM Found hardcoded frequency - move to DroneConstants"
                MAGIC_ERRORS=$((MAGIC_ERRORS + 1))
              fi
            done || true

          # Check for hardcoded RSSI thresholds
          grep -rnE '(\b-[0-9]{2,}\b)' \
            firmware/application/apps/enhanced_drone_analyzer/*.cpp 2>/dev/null | \
            grep -v '//' | \
            grep -v 'constexpr' | \
            grep -v 'rssi_threshold' | \
            while read line; do
              FILE=$(echo "$line" | cut -d: -f1)
              LINE_NUM=$(echo "$line" | cut -d: -f2)
              CONTENT=$(echo "$line" | cut -d: -f3-)

              if echo "$CONTENT" | grep -qE '\b-[0-9]{2,}\b'; then
                echo "::warning title=Magic RSSI Value::$FILE:$LINE_NUM Found hardcoded RSSI - move to DroneConstants"
              fi
            done || true

          # Check for hardcoded time intervals
          grep -rnE '(\b[0-9]{3,}(?![;])\s*\*\s*1000\b)' \
            firmware/application/apps/enhanced_drone_analyzer/*.cpp 2>/dev/null | \
            while read line; do
              FILE=$(echo "$line" | cut -d: -f1)
              LINE_NUM=$(echo "$line" | cut -d: -f2)
              echo "::warning title=Magic Time Interval::$FILE:$LINE_NUM Found hardcoded ms value - use constant"
            done || true

          if [ "$MAGIC_ERRORS" -gt 0 ]; then
            echo "::warning title=Magic Numbers Summary::Found $MAGIC_ERRORS magic numbers"
          else
            echo "✅ No magic numbers found"
          fi

  # ==============================================
  # JOB: Binary Size Analysis
  # ==============================================
  binary_size_check:
    name: Binary Size Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Binary Sizes
        run: |
          echo "=== Checking Binary Sizes ==="

          # Find all .o files in enhanced_drone_analyzer
          if find firmware/application/apps/enhanced_drone_analyzer -name '*.o' 2>/dev/null | head -n1 > /dev/null; then
            TOTAL_SIZE=0
            MAX_SIZE=0

            for obj in firmware/application/apps/enhanced_drone_analyzer/*.o; do
              if [ -f "$obj" ]; then
                SIZE=$(stat -c%s "$obj" 2>/dev/null || stat -f%z "$obj" 2>/dev/null || echo "0")
                SIZE_KB=$((SIZE / 1024))
                TOTAL_SIZE=$((TOTAL_SIZE + SIZE))

                if [ "$SIZE" -gt "$MAX_SIZE" ]; then
                  MAX_SIZE=$SIZE
                  MAX_FILE=$obj
                fi

                echo "$(basename $obj): ${SIZE_KB}KB"

                # Warn for large files (> 50KB)
                if [ "$SIZE_KB" -gt 50 ]; then
                  echo "::warning title=Large Object File::$obj is ${SIZE_KB}KB"
                fi
              fi
            done

            TOTAL_KB=$((TOTAL_SIZE / 1024))
            echo "Total size: ${TOTAL_KB}KB"

            # Fail if total > 500KB
            if [ "$TOTAL_KB" -gt 500 ]; then
              echo "::error title=Binary Size Too Large::Total size ${TOTAL_KB}KB exceeds 500KB limit"
              exit 1
            fi
          else
            echo "⚠️ No object files found - may need to build first"
          fi

  # ==============================================
  # JOB: Host Build Check
  # ==============================================
  host_build:
    name: Host Build Check (GCC)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make

      - name: Build Pure Logic Classes
        run: |
          echo "=== Building Pure Logic Classes for Unit Testing ==="

          # Create build directory
          mkdir -p build/tests

          # Compile test files (standalone)
          cd firmware/application/apps/enhanced_drone_analyzer/tests
          g++ -std=c++17 -O2 -Wall -Wextra test_median_filter.cpp -o build/test_median_filter || true
          g++ -std=c++17 -O2 -Wall -Wextra test_spectral_analyzer.cpp -o build/test_spectral_analyzer || true
          g++ -std=c++17 -O2 -Wall -Wextra test_drone_validation.cpp -o build/test_drone_validation || true

          echo "✅ Host build check completed"

  # ==============================================
  # JOB: Unit Tests
  # ==============================================
  unit_tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make

      - name: Build and Run Tests
        run: |
          echo "=== Running Unit Tests ==="

          cd firmware/application/apps/enhanced_drone_analyzer/tests

          # Build tests directory
          mkdir -p build

          # Compile test_median_filter
          echo "Compiling test_median_filter..."
          g++ -std=c++17 -O2 -Wall -Wextra test_median_filter.cpp -o build/test_median_filter
          if [ -f build/test_median_filter ]; then
            echo "Running test_median_filter..."
            ./build/test_median_filter
          fi

          # Compile test_spectral_analyzer
          echo "Compiling test_spectral_analyzer..."
          g++ -std=c++17 -O2 -Wall -Wextra test_spectral_analyzer.cpp -o build/test_spectral_analyzer
          if [ -f build/test_spectral_analyzer ]; then
            echo "Running test_spectral_analyzer..."
            ./build/test_spectral_analyzer
          fi

          # Compile test_drone_validation
          echo "Compiling test_drone_validation..."
          g++ -std=c++17 -O2 -Wall -Wextra test_drone_validation.cpp -o build/test_drone_validation
          if [ -f build/test_drone_validation ]; then
            echo "Running test_drone_validation..."
            ./build/test_drone_validation
          fi

          echo "✅ All unit tests passed"

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: firmware/application/apps/enhanced_drone_analyzer/tests/build/

  # ==============================================
  # FINAL: Combined Status
  # ==============================================
  final_status:
    name: Final Status
    runs-on: ubuntu-latest
    needs: [static_analysis, clang_format_check, dependency_check, stack_usage_check, heap_usage_check, magic_numbers_check, binary_size_check, host_build, unit_tests]
    if: always()

    steps:
      - name: Check All Jobs Status
        run: |
          echo "## Final CI Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Static Analysis | ${NEEDS_STATIC_ANALYSIS_STATUS} |" >> $GITHUB_STEP_SUMMARY
          echo "| Clang-Format Check | ${NEEDS_CLANG_FORMAT_CHECK_STATUS} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Check | ${NEEDS_DEPENDENCY_CHECK_STATUS} |" >> $GITHUB_STEP_SUMMARY
          echo "| Stack Usage Check | ${NEEDS_STACK_USAGE_CHECK_STATUS} |" >> $GITHUB_STEP_SUMMARY
          echo "| Heap Usage Check | ${NEEDS_HEAP_USAGE_CHECK_STATUS} |" >> $GITHUB_STEP_SUMMARY
          echo "| Magic Numbers Check | ${NEEDS_MAGIC_NUMBERS_CHECK_STATUS} |" >> $GITHUB_STEP_SUMMARY
          echo "| Binary Size Check | ${NEEDS_BINARY_SIZE_CHECK_STATUS} |" >> $GITHUB_STEP_SUMMARY
          echo "| Host Build Check | ${NEEDS_HOST_BUILD_STATUS} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${NEEDS_UNIT_TESTS_STATUS} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Overall result
          if echo "$NEEDS_STATIC_ANALYSIS_STATUS" | grep -q "failure"; then
            echo "❌ **CI FAILED**: Static analysis found critical issues"
            exit 1
          elif echo "$NEEDS_UNIT_TESTS_STATUS" | grep -q "failure"; then
            echo "❌ **CI FAILED**: Unit tests failed"
            exit 1
          elif echo "$NEEDS_CLANG_FORMAT_CHECK_STATUS" | grep -q "failure"; then
            echo "❌ **CI FAILED**: Code formatting issues found"
            exit 1
          elif echo "$NEEDS_STATIC_ANALYSIS_STATUS" | grep -q "skipped"; then
            echo "⚠️ **CI SKIPPED**: Static analysis was skipped"
          else
            echo "✅ **CI PASSED**: All checks completed successfully"
          fi
